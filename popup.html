<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: 280px;
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        background: #fff;
        padding: 20px;
      }
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
      }
      .logo {
        width: 32px;
        height: 32px;
        background: #eaf3de;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
      }
      .title {
        font-size: 16px;
        font-weight: 600;
        color: #000;
      }
      .subtitle {
        font-size: 12px;
        color: #888;
      }
      .divider {
        height: 0.5px;
        background: #e0e0e0;
        margin-bottom: 16px;
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
      }
      .label {
        font-size: 14px;
        color: #000;
      }
      .sublabel {
        font-size: 12px;
        color: #888;
        margin-top: 2px;
      }
      .toggle-wrap {
        position: relative;
        width: 44px;
        height: 24px;
      }
      .toggle-wrap input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        cursor: pointer;
        inset: 0;
        background: #ccc;
        border-radius: 99px;
        transition: 0.2s;
      }
      .slider:before {
        content: "";
        position: absolute;
        height: 18px;
        width: 18px;
        left: 3px;
        bottom: 3px;
        background: white;
        border-radius: 50%;
        transition: 0.2s;
      }
      input:checked + .slider {
        background: #639922;
      }
      input:checked + .slider:before {
        transform: translateX(20px);
      }
      .footer {
        font-size: 11px;
        color: #bbb;
        text-align: center;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <img
          src="icons/icon48.png"
          alt="VisaTrack"
          style="
            width: 100%;
            height: 100%;
            object-fit: contain;
            border-radius: 6px;
          "
        />
      </div>
      <div>
        <div class="title">VisaTrack</div>
        <div class="subtitle">H1B Sponsorship Filter</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="row">
      <div>
        <div class="label">H1B Only Filter</div>
        <div class="sublabel">Hide non-sponsoring companies</div>
      </div>
      <label class="toggle-wrap">
        <input type="checkbox" id="filterToggle" />
        <span class="slider"></span>
      </label>
    </div>

    <div class="divider"></div>

    <div class="footer">Data: DOL LCA Disclosure 2020-25</div>

    <script src="popup.js"></script>
  </body>
</html>
